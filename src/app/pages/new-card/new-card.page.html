<ion-content class="nc-content" [fullscreen]="true">
  <div class="nc-bg">
    <div class="dw-orb dw-orb--purple nc-orb1"></div>
    <div class="dw-orb dw-orb--pink nc-orb2"></div>
  </div>

  <div class="nc-wrapper">
    <div class="nc-header dw-anim-fade-down">
      <button class="back-btn dw-press" (click)="goBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <div class="nc-title">
        <span class="eyebrow">registro · tarjeta</span>
        <h1><span class="dw-gradient-text">Nueva tarjeta</span></h1>
        <p>Agrega una Visa o Mastercard</p>
      </div>
    </div>

    <div class="preview-area dw-anim-fade-up dw-delay-1">
      <app-wallet-card [card]="cardPreview" [showBalance]="false"></app-wallet-card>
    </div>

    <div *ngIf="detectedNetwork !== 'unknown'" class="network-badge dw-anim-pop">
      <ion-icon name="checkmark-circle"></ion-icon>
      <span>{{ detectedNetwork | uppercase }} detectada</span>
      <div class="badge-shine"></div>
    </div>

    <div class="nc-form-card dw-anim-fade-up dw-delay-2">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field-group dw-anim-slide-r dw-delay-2"
             [class.invalid]="form.controls.cardHolder.touched && form.controls.cardHolder.invalid">
          <label>Titular de la tarjeta</label>
          <div class="field-inner">
            <ion-icon name="person-outline"></ion-icon>
            <ion-input formControlName="cardHolder" placeholder="JUAN PÉREZ" autocapitalize="characters"></ion-input>
          </div>
        </div>

        <div class="field-group dw-anim-slide-r dw-delay-3"
             [class.invalid]="form.controls.cardNumber.touched && form.controls.cardNumber.invalid">
          <label>Número de tarjeta</label>
          <div class="field-inner">
            <ion-icon name="card-outline"></ion-icon>
            <ion-input type="tel" inputmode="numeric" formControlName="cardNumber"
              (ionInput)="onNumberInput($event)" maxlength="23" placeholder="1234 5678 9012 3456"></ion-input>
          </div>
        </div>

        <div class="nc-row dw-anim-slide-r dw-delay-4">
          <div class="field-group" [class.invalid]="form.controls.expiration.touched && form.controls.expiration.invalid">
            <label>Expiración</label>
            <div class="field-inner">
              <ion-icon name="calendar-outline"></ion-icon>
              <ion-input type="tel" inputmode="numeric" formControlName="expiration"
                (ionInput)="onExpiryInput($event)" maxlength="5" placeholder="MM/AA"></ion-input>
            </div>
            <span class="err-hint" *ngIf="form.controls.expiration.touched && form.controls.expiration.invalid">Formato MM/AA</span>
          </div>

          <div class="field-group" [class.invalid]="form.controls.cvv.touched && form.controls.cvv.invalid">
            <label>CVV</label>
            <div class="field-inner">
              <ion-icon name="shield-outline"></ion-icon>
              <ion-input type="tel" inputmode="numeric" formControlName="cvv" maxlength="4" placeholder="•••"></ion-input>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-primary dw-anim-fade-up dw-delay-5 dw-press" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <ng-container *ngIf="!loading">
            <ion-icon name="add-circle-outline"></ion-icon>
            <span>Guardar tarjeta</span>
          </ng-container>
        </button>
      </form>
    </div>
  </div>
</ion-content>
