<div class="dw-card"
     [class.network-visa]="card.network === 'visa'"
     [class.network-mc]="card.network === 'mastercard'">
  <div class="card-shine"></div>
  <div class="card-glow"></div>
  <div class="card-noise"></div>

  <div class="card-header">
    <div class="chip-icon">
      <div class="chip-line"></div>
      <div class="chip-line"></div>
      <div class="chip-dot"></div>
    </div>
    <div class="network-stack">
      <ion-icon class="wave-icon" name="wifi-outline"></ion-icon>
      <span class="network-badge">{{ networkLabel }}</span>
    </div>
  </div>

  <div class="card-number">
    <span class="dot-group">••••</span>
    <span class="dot-group">••••</span>
    <span class="dot-group">••••</span>
    <span class="digits">{{ card.lastDigits }}</span>
  </div>

  <div class="card-footer">
    <div class="holder-info">
      <span class="field-label">Titular</span>
      <span class="field-value">{{ card.cardHolder }}</span>
    </div>
    <div class="expiry-info">
      <span class="field-label">Vence</span>
      <span class="field-value">{{ expiryLabel }}</span>
    </div>
  </div>

  <div class="card-balance" *ngIf="showBalance">
    <span class="balance-label">Saldo disponible</span>
    <span class="balance-amount">${{ card.availableBalance | number:'1.0-0' }}</span>
  </div>
</div>
